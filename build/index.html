    <script>
      // Decode the redirect from 404.html for GitHub Pages SPA routing
      // https://github.com/rafgraph/spa-github-pages
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(
            null, null,
            decoded[0] + (decoded[1] ? '&' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
